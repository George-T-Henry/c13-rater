<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>C13 pair validation</title>
<style>
:root { --bg:#f7f7f5; --card:#fff; --ink:#1a1a1a; --mut:#6b6b6b; --line:#e2e2de;
        --pos:#eaf5ea; --neg:#fdf0ee; --acc:#2c6e49; --warn:#b3452c; --chip:#eee; }
@media (prefers-color-scheme: dark) {
  :root { --bg:#141414; --card:#1e1e1e; --ink:#e8e8e8; --mut:#9a9a9a; --line:#333;
          --pos:#1c2a1c; --neg:#2c1d1a; --acc:#7dc99a; --warn:#e08a6d; --chip:#2a2a2a; } }
* { box-sizing:border-box; }
body { margin:0; font:15px/1.55 system-ui,sans-serif; background:var(--bg); color:var(--ink); }
header { position:sticky; top:0; background:var(--card); border-bottom:1px solid var(--line);
         padding:10px 18px; display:flex; gap:14px; align-items:center; flex-wrap:wrap; z-index:5; }
header .prog { flex:1; min-width:180px; }
.bar { height:8px; background:var(--chip); border-radius:4px; overflow:hidden; }
.bar > div { height:100%; background:var(--acc); width:0%; transition:width .15s; }
.wrap { max-width:1200px; margin:14px auto; padding:0 16px 120px; }
.meta { display:flex; gap:10px; flex-wrap:wrap; align-items:baseline; margin-bottom:8px; }
.chip { background:var(--chip); border-radius:12px; padding:2px 10px; font-size:12.5px; color:var(--mut); }
.concept { font-size:21px; font-weight:700; text-transform:capitalize; }
.def { color:var(--mut); font-size:13.5px; margin:2px 0 12px; }
.texts { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media (max-width:860px){ .texts { grid-template-columns:1fr; } }
.panel { border:1px solid var(--line); border-radius:10px; padding:14px 16px; background:var(--card);
         max-height:52vh; overflow-y:auto; white-space:pre-wrap; }
.panel.pos { background:var(--pos); } .panel.neg { background:var(--neg); }
.panel h3 { margin:0 0 8px; font-size:12.5px; letter-spacing:.06em; color:var(--mut); }
.controls { position:fixed; bottom:0; left:0; right:0; background:var(--card);
            border-top:1px solid var(--line); padding:10px 18px; }
.controls .inner { max-width:1200px; margin:0 auto; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
button { font:14px system-ui,sans-serif; border:1px solid var(--line); background:var(--chip);
         color:var(--ink); border-radius:8px; padding:8px 14px; cursor:pointer; }
button.primary { background:var(--acc); color:#fff; border-color:var(--acc); font-weight:600; }
button.flag { border-color:var(--warn); color:var(--warn); background:transparent; }
button.on { outline:3px solid var(--acc); }
button.off { outline:3px solid var(--warn); }
button:disabled { opacity:.5; cursor:not-allowed; }
#notes { flex:1; min-width:160px; padding:8px 10px; border:1px solid var(--line);
         border-radius:8px; background:var(--bg); color:var(--ink); }
.kbd { color:var(--mut); font-size:12px; }
.count { font-variant-numeric:tabular-nums; }
.done { color:var(--acc); font-weight:700; }
.pending { color:var(--warn); }
.tick { font-size:12.5px; color:var(--mut); }
#loading { max-width:1200px; margin:60px auto; padding:0 16px; color:var(--mut); text-align:center; }
#app { visibility:hidden; }
#overlay { position:fixed; inset:0; background:var(--bg); z-index:50; display:flex;
           align-items:center; justify-content:center; padding:24px; text-align:center; }
</style></head><body>

<div id="loading">Loading the task…</div>

<div id="app">
<header>
  <div><strong>C13 pair validation</strong> <span class="tick" id="tick"></span></div>
  <div class="prog"><div class="bar"><div id="pbar"></div></div></div>
  <div class="count" id="pcount"></div>
  <button id="export" class="primary" disabled title="answer every pair first">Finish &amp; submit</button>
  <button id="clear" title="wipe all saved answers">Reset</button>
</header>
<div class="wrap">
  <div class="meta">
    <span class="concept" id="concept"></span>
    <span class="chip" id="conceptprog"></span>
    <span class="chip" id="pairid"></span>
    <span class="chip" id="gen"></span>
  </div>
  <div class="def" id="def"></div>
  <div class="meta"><span class="chip" id="topic"></span></div>
  <div class="texts">
    <div class="panel pos"><h3>POSITIVE — should EXPRESS the concept</h3><div id="pos"></div></div>
    <div class="panel neg"><h3>NEGATIVE — should LACK it / express the opposite</h3><div id="neg"></div></div>
  </div>
</div>
<div class="controls"><div class="inner">
  <button id="prev">←</button>
  <button class="primary" id="valid">✓ Valid pair <span class="kbd">(A)</span></button>
  <button id="q1">pos expresses <span class="kbd">(1)</span></button>
  <button id="q2">neg absent/opp <span class="kbd">(2)</span></button>
  <button id="q3">pair valid <span class="kbd">(3)</span></button>
  <input id="notes" placeholder="notes — why it fails (N to focus)">
  <button id="next">→ next</button>
  <span class="kbd">A=all-good · 1/2/3=toggle · N=notes · ←/→=move</span>
</div></div>
</div>

<script>
// ===== Config ============================================================
const SUPA_URL = "https://guzoywuckuvubvkvnyoe.supabase.co";
const SUPA_KEY = "sb_publishable_RaTqK1GDou-HhX38cpOSgQ_Lv_fNnf2";
const REST = SUPA_URL + "/rest/v1";
const HDRS = { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY };
const COMPLETION_CODE = "C13FIRSTPASS";

const QS = new URLSearchParams(location.search);
const DATASET = QS.get("dataset") || "c13_firstpass";
const BLOCK = QS.get("block");                              // string | null
const PROLIFIC_PID = QS.get("PROLIFIC_PID") || QS.get("prolific_pid") || "";
const STUDY_ID = QS.get("STUDY_ID") || "";
const SESSION_ID = QS.get("SESSION_ID") || "";
const IS_PARTICIPANT = !!PROLIFIC_PID;
const LS = "c13_" + DATASET + "_" + (BLOCK ?? "all") + "_" + (PROLIFIC_PID || "preview");

const $ = id => document.getElementById(id);
let pairs = [], defs = {}, store = {}, i = 0;

// ===== Data loading ======================================================
async function boot() {
  try {
    if (IS_PARTICIPANT) $("clear").style.display = "none";
    // definitions
    const dRes = await fetch(REST + "/c13_defs?dataset=eq." + encodeURIComponent(DATASET) +
      "&select=concept,definition", { headers: HDRS });
    if (!dRes.ok) throw new Error("defs HTTP " + dRes.status);
    (await dRes.json()).forEach(r => { defs[r.concept] = r.definition; });
    // pairs (optionally filtered to a block)
    let url = REST + "/c13_pairs?dataset=eq." + encodeURIComponent(DATASET) +
      "&select=pair_id,block,concept,topic,domain,model_name,content_jaccard,pos_text,neg_text" +
      "&order=concept,pair_id&limit=2000";
    if (BLOCK !== null && BLOCK !== "") url += "&block=eq." + encodeURIComponent(BLOCK);
    const pRes = await fetch(url, { headers: HDRS });
    if (!pRes.ok) throw new Error("pairs HTTP " + pRes.status);
    pairs = await pRes.json();
    if (!pairs.length) {
      overlay("<h2>No pairs to show</h2><p>dataset “" + DATASET + "”, block “" +
        (BLOCK ?? "–") + "”. Check the study link.</p>");
      return;
    }
    store = JSON.parse(localStorage.getItem(LS) || "{}");
    for (let k = 0; k < pairs.length; k++) { if (!store[key(pairs[k])]) { i = k; break; } }
    $("tick").textContent =
      (BLOCK !== null && BLOCK !== "" ? "block " + BLOCK + " · " : "preview · ") +
      "answers auto-save on this device";
    $("loading").style.display = "none";
    $("app").style.visibility = "visible";
    render();
    if (localStorage.getItem(LS + "_submitted") === "1" && IS_PARTICIPANT) showAlready();
  } catch (e) {
    overlay("<h2 style='color:var(--warn)'>Couldn’t load the task</h2><p>" + String(e) +
      "</p><p>Please refresh the page. If it keeps failing, contact the researcher.</p>");
  }
}

// ===== Rating state ======================================================
function key(p) { return p.pair_id + "|" + p.concept; }
function get(p) { return store[key(p)] || null; }
function save(p, rec) { store[key(p)] = rec; localStorage.setItem(LS, JSON.stringify(store)); paint(); }
function answered() { return pairs.filter(p => get(p)).length; }
function current() { return pairs[i]; }
function rec() { return get(current()) || { pos: null, neg: null, valid: null, notes: "" }; }

function render() {
  const p = pairs[i];
  $("concept").textContent = p.concept.replace("_", " ");
  $("def").textContent = defs[p.concept] || "";
  $("pairid").textContent = p.pair_id;
  $("gen").textContent = p.model_name || "";
  $("topic").textContent = "topic: " + (p.topic || "");
  $("pos").textContent = p.pos_text;
  $("neg").textContent = p.neg_text;
  const sib = pairs.filter(q => q.concept === p.concept);
  const done = sib.filter(q => get(q)).length;
  $("conceptprog").textContent = done + "/" + sib.length + " in concept";
  const r = get(p) || {};
  for (const [id, f] of [["q1", "pos"], ["q2", "neg"], ["q3", "valid"]]) {
    const b = $(id); b.classList.remove("on", "off");
    if (r[f] === 1) b.classList.add("on");
    if (r[f] === 0) b.classList.add("off");
  }
  $("notes").value = r.notes || "";
  document.querySelectorAll(".panel").forEach(el => el.scrollTop = 0);
  paint();
}
function paint() {
  const n = answered();
  $("pbar").style.width = (100 * n / pairs.length) + "%";
  $("pcount").innerHTML = `<span class="${n === pairs.length ? 'done' : 'pending'}">${n}/${pairs.length}</span>`;
  const complete = n === pairs.length;
  $("export").disabled = !complete;
  $("export").title = complete ? "submit your answers" : "answer every pair first";
}
function toggle(f) { const r = rec(); r[f] = (r[f] === 1 ? 0 : 1); r.notes = $("notes").value; save(current(), r); render(); }
function allGood() { save(current(), { pos: 1, neg: 1, valid: 1, notes: $("notes").value }); move(1); }
function move(d) {
  const r = rec();
  if (r.pos !== null || r.neg !== null || r.valid !== null) { r.notes = $("notes").value; save(current(), r); }
  i = Math.min(pairs.length - 1, Math.max(0, i + d)); render();
}

// ===== Submit + completion ==============================================
function buildRows() {
  return pairs.map(p => {
    const r = get(p) || {};
    return {
      dataset: DATASET, block: p.block, pair_id: p.pair_id, concept: p.concept,
      prolific_pid: PROLIFIC_PID, study_id: STUDY_ID, session_id: SESSION_ID,
      pos: r.pos ?? null, neg: r.neg ?? null, valid: r.valid ?? null,
      notes: r.notes || "", user_agent: navigator.userAgent
    };
  });
}
function overlay(html) {
  let el = $("overlay");
  if (!el) { el = document.createElement("div"); el.id = "overlay"; document.body.appendChild(el); }
  el.style.display = "flex";
  el.innerHTML = "<div style='max-width:520px'>" + html + "</div>";
}
function prolificReturn() {
  return "https://app.prolific.com/submissions/complete?cc=" + encodeURIComponent(COMPLETION_CODE);
}
function showAlready() {
  overlay("<h2 style='color:var(--acc)'>You already submitted this block.</h2>" +
    "<p>Completion code: <b>" + COMPLETION_CODE + "</b></p>" +
    "<p><a href='" + prolificReturn() + "'><button class='primary'>Return to Prolific ▸</button></a></p>");
}
async function submitAll() {
  const btn = $("export"); btn.disabled = true; btn.textContent = "Submitting…";
  try {
    const resp = await fetch(REST + "/c13_ratings", {
      method: "POST",
      headers: { ...HDRS, "Content-Type": "application/json", "Prefer": "return=minimal" },
      body: JSON.stringify(buildRows())
    });
    if (!resp.ok) throw new Error("HTTP " + resp.status + " " + (await resp.text()));
    localStorage.setItem(LS + "_submitted", "1");
    if (IS_PARTICIPANT) {
      overlay("<h2 style='color:var(--acc)'>Thank you — your answers were submitted.</h2>" +
        "<p>Click below to register completion on Prolific. If it doesn’t redirect, your " +
        "completion code is <b>" + COMPLETION_CODE + "</b>.</p>" +
        "<p><a href='" + prolificReturn() + "'><button class='primary' style='font-size:16px;padding:12px 22px'>" +
        "Return to Prolific ▸</button></a></p>");
      location.href = prolificReturn();
    } else {
      overlay("<h2 style='color:var(--acc)'>Submitted.</h2><p>(Preview mode — no Prolific redirect.)</p>");
    }
  } catch (e) {
    btn.disabled = false; btn.textContent = "Finish & submit";
    overlay("<h2 style='color:var(--warn)'>Submission failed</h2>" +
      "<p>Your answers are still saved on this device. Press retry. If it keeps failing, contact the researcher.</p>" +
      "<p style='color:var(--mut);font-size:12px'>" + String(e).slice(0, 300) + "</p>" +
      "<p><button class='primary' onclick='$(\"overlay\").style.display=\"none\";submitAll();'>Retry submit</button></p>");
  }
}

// ===== Wiring ============================================================
$("valid").onclick = allGood;
$("q1").onclick = () => toggle("pos");
$("q2").onclick = () => toggle("neg");
$("q3").onclick = () => toggle("valid");
$("prev").onclick = () => move(-1);
$("next").onclick = () => move(1);
$("export").onclick = submitAll;
$("notes").addEventListener("change", () => { const r = rec(); r.notes = $("notes").value; save(current(), r); });
$("clear").onclick = () => { if (confirm("Wipe ALL saved answers for this block?")) { store = {}; localStorage.removeItem(LS); i = 0; render(); } };
document.addEventListener("keydown", e => {
  if (!pairs.length) return;
  if (document.activeElement === $("notes")) { if (e.key === "Escape") document.activeElement.blur(); return; }
  if (e.key === "a" || e.key === "A" || e.key === "Enter") { e.preventDefault(); allGood(); }
  else if (e.key === "1") toggle("pos");
  else if (e.key === "2") toggle("neg");
  else if (e.key === "3") toggle("valid");
  else if (e.key === "x" || e.key === "X") { toggle("valid"); $("notes").focus(); }
  else if (e.key === "n" || e.key === "N") { e.preventDefault(); $("notes").focus(); }
  else if (e.key === "ArrowRight") move(1);
  else if (e.key === "ArrowLeft") move(-1);
});

boot();
</script></body></html>
